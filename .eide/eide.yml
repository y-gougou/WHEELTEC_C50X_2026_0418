        - MiddleWares/STM32_USB_Host_Library/Core/Inc
        - .cmsis/include
        - USER/RTE/_4WD_Car
      libList: []
    excludeList:
      - <virtual_root>/CarType/akm_robot_init.c
      - <virtual_root>/CarType/diff_robot_init.c
      - <virtual_root>/CarType/mec_robot_init.c
      - <virtual_root>/CarType/omni_robot_init.c
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 4
          afterBuildTasks:
            - name: "[Copy linker output for Keil User Commands]"
              abortAfterFailed: true
              command: cd .\USER && mkdir ${KEIL_OUTPUT_DIR} & copy "${OutDir}\${ProjectName}.axf" "${KEIL_OUTPUT_DIR}\${KEIL_OUTPUT_NAME}.axf"
              disable: false
            - name: fromelf --bin --output=..\4WD_Car.bin ..\OBJ\4WD_Car.axf
              abortAfterFailed: true
              command: cd .\USER && fromelf --bin --output=..\4WD_Car.bin ..\OBJ\4WD_Car.axf
              disable: false
            - name: .\copyhex.bat
              abortAfterFailed: true
              command: cd .\USER && .\copyhex.bat
              disable: false
          asm-compiler: {}
          beforeBuildTasks:
            - name: .\hexbinHandle.bat
              abortAfterFailed: true
              command: cd .\USER && .\hexbinHandle.bat
              disable: false
              stopBuildAfterFailed: true
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-3
            warnings: unspecified
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
          RAM:
            - id: 1
